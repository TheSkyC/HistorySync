target-version = "py312"
line-length = 120

[lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "PTH", "RUF", "C4", "RET", "T20", "PL", "Q", "N"]
allowed-confusables = ["，", "。", "：", "；", "（", "）", "！", "？", "“", "”", "‘", "’", "＃", "〇", "×"]
ignore = [
    "B008", "B027", "E501", "E741", "F402",
    "N802", "N803", "N806", "N815",
    "PLR0913", "PLR0915", "PLR2004",
    "RET504", "RUF012",
    "SIM102", "SIM105",
    "PLC0415"
]
dummy-variable-rgx = "^(_+|(_[a-zA-Z0-9_]+)|(_))$"

[lint.isort]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
known-first-party = ["src"]
known-third-party = ["PySide6", "webdav3"]
force-sort-within-sections = true
combine-as-imports = true

[lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"

[lint.pylint]
max-branches = 60
max-returns = 30
max-statements = 200

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"main.py" = ["E402"]
"cli.py" = ["T201", "PLW0603"]
"tests/*.py" = ["E402"]

[lint.mccabe]
max-complexity = 15

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"