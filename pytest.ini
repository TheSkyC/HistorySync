[pytest]
# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────────
# -v        verbose test names
# -ra       show short summary for all non-passing tests
# --tb=short  compact tracebacks
addopts =
    -v
    -ra
    --tb=short
    --strict-markers
    --import-mode=importlib

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    slow: mark test as slow-running (use -m "not slow" to skip)
    integration: end-to-end tests that exercise multiple components together

# ── Minimum version ───────────────────────────────────────────────────────────
minversion = 7.0
